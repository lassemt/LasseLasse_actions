name: Terraform App

on:
  workflow_call:
    inputs:
      client-name:
        required: true
        type: string
        description: "Client name matching the infra client directory"
      aws-management-account-id:
        required: true
        type: string
        description: "The 12-digit AWS account ID where hub IAM roles are defined"
      working-directory:
        required: false
        type: string
        default: "infra/prod"
      terraform-version:
        required: false
        type: string
        default: "1.15.6"
      aws-region:
        required: false
        type: string
        default: "eu-north-1"
        description: "AWS region for authentication"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ inputs.client-name }}-${{ inputs.working-directory }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ inputs.aws-region }}
  TF_IN_AUTOMATION: true

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws-management-account-id }}:role/github-actions-app-deploy-${{ inputs.client-name }}
          aws-region: ${{ env.AWS_REGION }}

      # terraform_wrapper (default: true) captures stdout, stderr, and exitcode
      # as step outputs — needed by the PR comment step below.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Cache Terraform providers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ inputs.working-directory }}/.terraform/providers
          key: terraform-providers-${{ inputs.working-directory }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working-directory)) }}
          restore-keys: |
            terraform-providers-${{ inputs.working-directory }}-

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ inputs.working-directory }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ inputs.working-directory }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: terraform plan -no-color -detailed-exitcode
        continue-on-error: true

      - name: Comment Plan on PR
        if: steps.plan.outcome != 'skipped'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const marker = `<!-- tf-plan-${{ inputs.working-directory }} -->`;
            const exitcode = parseInt(process.env.PLAN_EXITCODE, 10);

            let icon, summary;
            if (exitcode === 0) {
              icon = '✅';
              summary = 'No changes. Infrastructure is up-to-date.';
            } else if (exitcode === 2) {
              icon = '✅';
              summary = 'Changes detected. Review the plan below.';
            } else {
              icon = '❌';
              summary = 'Plan failed. See error output below.';
            }

            const output = exitcode === 1
              ? (process.env.PLAN_STDERR || process.env.PLAN_OUTPUT)
              : process.env.PLAN_OUTPUT;
            const truncated = output && output.length > 60000
              ? output.substring(0, 60000) + '\n... (truncated)'
              : (output || '');

            const body = [
              marker,
              `### ${icon} Terraform Plan: \`${{ inputs.working-directory }}\``,
              '',
              summary,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == 1
        run: exit 1

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws-management-account-id }}:role/github-actions-app-deploy-${{ inputs.client-name }}
          aws-region: ${{ env.AWS_REGION }}

      # terraform_wrapper disabled so terraform writes directly to stdout/stderr
      # and returns real exit codes (the wrapper can interfere with plan -out).
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ inputs.terraform-version }}
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ inputs.working-directory }}/.terraform/providers
          key: terraform-providers-${{ inputs.working-directory }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working-directory)) }}
          restore-keys: |
            terraform-providers-${{ inputs.working-directory }}-

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ inputs.working-directory }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ inputs.working-directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply tfplan
